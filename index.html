<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenAI Chatbot</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-soft: #17253d;
      --text: #e6edf7;
      --muted: #9bb0ce;
      --accent: #5ea0ff;
      --success: #36c98f;
      --danger: #ff6b7a;
      --border: #223452;
      --bot: #1a2d4a;
      --user: #2c4f84;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top right, #162946 0%, var(--bg) 50%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(920px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17, 26, 43, 0.95), rgba(11, 18, 32, 0.95));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 20, 36, 0.85);
    }

    .header h1 {
      margin: 0;
      font-size: 1.25rem;
      color: var(--accent);
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(20, 33, 54, 0.6);
    }

    .quick-btn {
      border: 1px solid #2f4a76;
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.86rem;
    }

    .quick-btn:hover { border-color: var(--accent); }

    .chat {
      height: 430px;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      border: 1px solid transparent;
    }

    .msg.bot {
      justify-self: start;
      background: var(--bot);
      border-color: #264267;
    }

    .msg.user {
      justify-self: end;
      background: var(--user);
      border-color: #4c79b8;
    }

    .status {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.87rem;
      background: rgba(20, 33, 54, 0.5);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
    }

    #prompt {
      width: 100%;
      border: 1px solid var(--border);
      background: #0f1b31;
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      outline: none;
      font-size: 0.95rem;
    }

    #prompt:focus { border-color: var(--accent); }

    #send {
      border: none;
      background: var(--accent);
      color: #071325;
      font-weight: 700;
      border-radius: 10px;
      padding: 0 18px;
      cursor: pointer;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 14px 12px;
    }

    a {
      color: #9ec6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>GenAI Chatbot Assistant</h1>
      <p>Instantly fetch online info, open websites, play videos, and run payment commands.</p>
    </section>

    <section class="toolbar">
      <button class="quick-btn" data-command="news about AI">AI News</button>
      <button class="quick-btn" data-command="open website github.com">Open GitHub</button>
      <button class="quick-btn" data-command="play video lofi beats">Play Lofi</button>
      <button class="quick-btn" data-command="pay 99 to Alex">Make Payment</button>
      <button class="quick-btn" data-command="weather in Delhi">Weather Search</button>
      <button class="quick-btn" data-command="help">Help</button>
    </section>

    <section id="chat" class="chat" aria-live="polite"></section>
    <div id="status" class="status">Ready</div>

    <section class="composer">
      <input id="prompt" type="text" placeholder="Type: open website youtube.com, play video coding tutorial, pay 250 to Ravi..." />
      <button id="send" type="button">Send</button>
    </section>

    <div class="hint">Tip: Press Enter to send. External links open in a new tab.</div>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const promptInput = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");
    const statusLine = document.getElementById("status");

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setStatus(text, type) {
      statusLine.textContent = text;
      if (type === "ok") {
        statusLine.style.color = "var(--success)";
      } else if (type === "err") {
        statusLine.style.color = "var(--danger)";
      } else {
        statusLine.style.color = "var(--muted)";
      }
    }

    function addMessage(role, text, isHtml) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = isHtml ? text : escapeHtml(text);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function ensureUrl(urlOrDomain) {
      const value = urlOrDomain.trim();
      if (/^https?:\/\//i.test(value)) return value;
      return "https://" + value;
    }

    function parsePayment(text) {
      const match = text.match(/pay\s+(\d+(?:\.\d+)?)\s+to\s+([a-zA-Z0-9 _-]+)/i);
      if (!match) return null;
      return { amount: match[1], to: match[2].trim() };
    }

    function genResponse(input) {
      const text = input.trim();
      const lower = text.toLowerCase();

      if (!text) {
        return { reply: "Please type a command.", action: null, status: "err" };
      }

      if (lower === "help") {
        return {
          reply:
            "I can do commands like:\n" +
            "- open website google.com\n" +
            "- play video javascript tutorial\n" +
            "- weather in Mumbai\n" +
            "- news about technology\n" +
            "- pay 150 to Rahul\n" +
            "- search latest AI tools",
          action: null,
          status: "ok"
        };
      }

      if (lower.includes("open website") || lower.startsWith("open ")) {
        const urlText = text.replace(/open website|open/gi, "").trim();
        if (!urlText) {
          return { reply: "Tell me which site to open. Example: open website wikipedia.org", action: null, status: "err" };
        }
        const url = ensureUrl(urlText);
        return {
          reply: `Opening <a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`,
          action: { type: "open", url: url },
          status: "ok"
        };
      }

      if (lower.startsWith("play video") || lower.startsWith("play ")) {
        const query = text.replace(/play video|play/gi, "").trim();
        if (!query) {
          return { reply: "Tell me what to play. Example: play video lofi music", action: null, status: "err" };
        }
        const youtube = "https://www.youtube.com/results?search_query=" + encodeURIComponent(query);
        return {
          reply: `Here are video results for "${escapeHtml(query)}": <a href="${youtube}" target="_blank" rel="noopener noreferrer">Open YouTube Search</a>`,
          action: { type: "open", url: youtube },
          status: "ok"
        };
      }

      const payment = parsePayment(text);
      if (payment) {
        const upiId = "demo@upi";
        const upiUrl =
          "upi://pay?pa=" +
          encodeURIComponent(upiId) +
          "&pn=" + encodeURIComponent(payment.to) +
          "&am=" + encodeURIComponent(payment.amount) +
          "&cu=INR";
        return {
          reply:
            `Payment request prepared:\n` +
            `Recipient: ${escapeHtml(payment.to)}\n` +
            `Amount: INR ${escapeHtml(payment.amount)}\n` +
            `UPI ID: ${upiId}\n` +
            `<a href="${upiUrl}">Try opening UPI app</a> (works on supported devices).`,
          action: null,
          status: "ok"
        };
      }

      if (lower.includes("weather") || lower.includes("news") || lower.startsWith("search ") || lower.includes("online info")) {
        const query = lower.startsWith("search ") ? text.replace(/search/i, "").trim() : text;
        const searchUrl = "https://www.google.com/search?q=" + encodeURIComponent(query);
        return {
          reply: `I found online information for "${escapeHtml(query)}": <a href="${searchUrl}" target="_blank" rel="noopener noreferrer">Open Search</a>`,
          action: { type: "open", url: searchUrl },
          status: "ok"
        };
      }

      return {
        reply:
          "I understood your message. For direct actions, try:\n" +
          "- open website <domain>\n" +
          "- play video <topic>\n" +
          "- pay <amount> to <name>\n" +
          "- search <query>",
        action: null,
        status: "ok"
      };
    }

    function handleInput(raw) {
      addMessage("user", raw, false);
      setStatus("Thinking...");
      const out = genResponse(raw);
      addMessage("bot", out.reply, true);
      setStatus(out.status === "err" ? "Needs input" : "Done", out.status === "err" ? "err" : "ok");

      if (out.action && out.action.type === "open") {
        window.open(out.action.url, "_blank", "noopener,noreferrer");
      }
    }

    sendBtn.addEventListener("click", () => {
      const value = promptInput.value.trim();
      if (!value) return;
      handleInput(value);
      promptInput.value = "";
      promptInput.focus();
    });

    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendBtn.click();
      }
    });

    document.querySelectorAll(".quick-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const cmd = btn.getAttribute("data-command") || "";
        promptInput.value = cmd;
        sendBtn.click();
      });
    });

    addMessage(
      "bot",
      "Hello! I am your GenAI assistant.\nTry: <b>open website cursor.com</b> or <b>pay 250 to Aman</b>.",
      true
    );
  </script>
</body>
</html>
